# Luật 1 Template: Cấm image tag :latest
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sdisallowedtags
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  crd:
    spec:
      names:
        kind: K8sDisallowedTags
      validation:
        openAPIV3Schema:
          type: object
          properties:
            tags:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sdisallowedtags

        # gom container của CẢ Pod (spec.containers) LẪN workload (spec.template.spec.containers)
        all_containers[c] {
          c := input.review.object.spec.containers[_]
        }
        all_containers[c] {
          c := input.review.object.spec.template.spec.containers[_]
        }

        violation[{"msg": msg}] {
          container := all_containers[_]
          tag := input.parameters.tags[_]
          endswith(container.image, concat("", [":", tag]))
          msg := sprintf("Image [%v] sử dụng tag bị cấm [%v]", [container.image, tag])
        }

---
# Luật 2 Template: Bắt buộc có resources.limits
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8scontainerlimits
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  crd:
    spec:
      names:
        kind: K8sContainerLimits
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8scontainerlimits

        all_containers[c] {
          c := input.review.object.spec.containers[_]
        }
        all_containers[c] {
          c := input.review.object.spec.template.spec.containers[_]
        }

        violation[{"msg": msg}] {
          container := all_containers[_]
          not container.resources.limits.cpu
          msg := sprintf("Container [%v] thiếu cpu limit.", [container.name])
        }
        violation[{"msg": msg}] {
          container := all_containers[_]
          not container.resources.limits.memory
          msg := sprintf("Container [%v] thiếu memory limit.", [container.name])
        }

---
# Luật 3 Template: Cấm runAsUser: 0 (Chạy dưới quyền root)
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sblockrootuser
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  crd:
    spec:
      names:
        kind: K8sBlockRootUser
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sblockrootuser

        all_containers[c] {
          c := input.review.object.spec.containers[_]
        }
        all_containers[c] {
          c := input.review.object.spec.template.spec.containers[_]
        }

        # runAsUser:0 ở cấp container
        violation[{"msg": msg}] {
          container := all_containers[_]
          container.securityContext.runAsUser == 0
          msg := sprintf("Container [%v] chạy bằng quyền root (runAsUser: 0).", [container.name])
        }
        # runAsUser:0 ở securityContext của Pod
        violation[{"msg": msg}] {
          input.review.object.spec.securityContext.runAsUser == 0
          msg := "Pod SecurityContext chạy bằng quyền root (runAsUser: 0)."
        }
        # runAsUser:0 ở securityContext trong template (Deployment/Rollout)
        violation[{"msg": msg}] {
          input.review.object.spec.template.spec.securityContext.runAsUser == 0
          msg := "Pod template SecurityContext chạy bằng quyền root (runAsUser: 0)."
        }

---
# Luật 4 Template: Cấm hostNetwork: true
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sblockhostnetwork
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  crd:
    spec:
      names:
        kind: K8sBlockHostNetwork
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sblockhostnetwork

        # hostNetwork ở Pod
        violation[{"msg": msg}] {
          input.review.object.spec.hostNetwork == true
          msg := "Không được phép sử dụng hostNetwork: true."
        }
        # hostNetwork trong template (Deployment/Rollout)
        violation[{"msg": msg}] {
          input.review.object.spec.template.spec.hostNetwork == true
          msg := "Không được phép sử dụng hostNetwork: true."
        }